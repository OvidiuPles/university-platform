<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professor Dashboard - Attendance System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .content {
            padding: 30px;
        }

        .session-controls {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-right: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .qr-section {
            display: none;
            background: #f8f9fa;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 30px;
        }

        .qr-section.active {
            display: block;
        }

        .qr-code {
            background: white;
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .qr-code img {
            max-width: 300px;
            height: auto;
        }

        .session-info {
            margin-top: 20px;
            text-align: left;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            font-weight: 600;
            color: #666;
        }

        .info-value {
            color: #333;
        }

        .attendance-counter {
            font-size: 3em;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }

        .attendance-list {
            margin-top: 30px;
        }

        .attendance-list h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .student-item {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .student-name {
            font-weight: 600;
            color: #333;
        }

        .check-in-time {
            color: #666;
            font-size: 0.9em;
        }

        .status-badge {
            background: #28a745;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Professor Dashboard</h1>
            <p>Real-Time Attendance Management System</p>
            <div style="margin-top: 14px;">
                <a href="/professor/history"
                   style="color: rgba(255,255,255,0.85); text-decoration: none; font-size: 0.95em; transition: color 0.2s;"
                   onmouseover="this.style.color='white'"
                   onmouseout="this.style.color='rgba(255,255,255,0.85)'">
                    📊 View Session History
                </a>
            </div>
        </div>

        <div class="content">
            <div class="session-controls">
                <h2>Start New Session</h2>
                <div class="form-group">
                    <label for="courseSelect">Select Course:</label>
                    <select id="courseSelect">
                        <option value="">-- Select a Course --</option>
                        <option value="1">CS101 - Introduction to Computer Science</option>
                        <option value="2">CS201 - Data Structures and Algorithms</option>
                        <option value="3">CS301 - Database Systems</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="expirationMinutes">QR Code Expiration (minutes):</label>
                    <input type="number" id="expirationMinutes" value="10" min="1" max="60">
                </div>
                <button class="btn btn-primary" onclick="startSession()">🚀 Start Session</button>
            </div>

            <div id="alertContainer"></div>

            <div id="qrSection" class="qr-section">
                <h2>Active Session</h2>
                <div class="qr-code">
                    <img id="qrCodeImage" src="" alt="QR Code">
                </div>
                
                <div class="session-info">
                    <div class="info-row">
                        <span class="info-label">Course:</span>
                        <span class="info-value" id="courseName">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Session Started:</span>
                        <span class="info-value" id="startTime">-</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Expires At:</span>
                        <span class="info-value" id="expirationTime">-</span>
                    </div>
                </div>

                <div class="attendance-counter" id="attendanceCounter">0</div>
                <p>Students Checked In</p>

                <button class="btn btn-danger" onclick="endSession()">⏹️ End Session</button>

                <div class="attendance-list">
                    <h3>Attendance List</h3>
                    <div id="studentList"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <script>
        let currentSessionId = null;
        let stompClient = null;

        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = `
                <div class="alert alert-${type}">
                    ${message}
                </div>
            `;
            setTimeout(() => {
                alertContainer.innerHTML = '';
            }, 5000);
        }

        function startSession() {
            const courseId = document.getElementById('courseSelect').value;
            const expirationMinutes = document.getElementById('expirationMinutes').value;

            if (!courseId) {
                showAlert('Please select a course', 'danger');
                return;
            }

            fetch(`/api/professor/session/start?courseId=${courseId}&expirationMinutes=${expirationMinutes}`, {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                currentSessionId = data.sessionId;
                
                // Display QR code
                document.getElementById('qrCodeImage').src = 'data:image/png;base64,' + data.qrCodeBase64;
                document.getElementById('courseName').textContent = data.courseName;
                document.getElementById('startTime').textContent = new Date(data.startTime).toLocaleString();
                document.getElementById('expirationTime').textContent = new Date(data.expirationTime).toLocaleString();
                document.getElementById('attendanceCounter').textContent = data.attendanceCount;
                
                // Show QR section
                document.getElementById('qrSection').classList.add('active');
                
                // Connect to WebSocket
                connectWebSocket(data.sessionId);
                
                showAlert('Session started successfully!', 'success');
            })
            .catch(error => {
                showAlert('Error starting session', 'danger');
                console.error('Error:', error);
            });
        }

        function connectWebSocket(sessionId) {
            const socket = new SockJS('/ws');
            stompClient = Stomp.over(socket);
            
            stompClient.connect({}, function(frame) {
                console.log('Connected to WebSocket');
                
                stompClient.subscribe('/topic/attendance/' + sessionId, function(message) {
                    const update = JSON.parse(message.body);
                    updateAttendance(update);
                });
            });
        }

        function updateAttendance(update) {
            document.getElementById('attendanceCounter').textContent = update.totalCount;

            const studentList = document.getElementById('studentList');
            const studentItem = document.createElement('div');
            studentItem.className = 'student-item';
            studentItem.innerHTML = `
                <div>
                    <div class="student-name">${update.studentName}</div>
                    <div class="check-in-time">Just now</div>
                </div>
                <div class="status-badge">✓ Present</div>
            `;
            studentList.insertBefore(studentItem, studentList.firstChild);
        }

        function endSession() {
            if (!currentSessionId) return;

            fetch(`/api/professor/session/${currentSessionId}/end`, {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                showAlert('Session ended successfully', 'success');
                document.getElementById('qrSection').classList.remove('active');
                
                if (stompClient) {
                    stompClient.disconnect();
                }
                
                currentSessionId = null;
                document.getElementById('studentList').innerHTML = '';
            })
            .catch(error => {
                showAlert('Error ending session', 'danger');
                console.error('Error:', error);
            });
        }
    </script>
</body>
</html>
